<!DOCTYPE html>
<html>
<head>
  <title>Web Windows OS</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      font-family: Arial;
      overflow: hidden;
      color: white;
    }

    /* Desktop */
    .desktop {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: linear-gradient(120deg, #1e3c72, #2a5298);
    }

    /* Icon */
    .icon {
      width: 80px;
      text-align: center;
      cursor: pointer;
      margin: 20px;
      user-select: none;
    }

    /* Window */
    .window {
      position: absolute;
      width: 500px;
      height: 350px;
      background: #1e1e1e;
      border: 1px solid #444;
      display: none;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Title bar */
    .titlebar {
      height: 30px;
      background: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      cursor: move;
      user-select: none;
    }

    .close {
      cursor: pointer;
      color: red;
      font-weight: bold;
    }

    /* Content */
    .content {
      flex: 1;
      background: white;
      color: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Taskbar */
    .taskbar {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: #111;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
  </style>
</head>

<body>

<div class="desktop">

  <div class="icon" onclick="openWindow()">
    🎮<br>Game
  </div>

  <!-- Window -->
  <div id="window" class="window">
    <div class="titlebar" id="dragbar">
      Game
      <span class="close" onclick="closeWindow()">X</span>
    </div>

    <div class="content">
      <iframe src="https://www.crazygames.com/embed/2048"></iframe>
    </div>
  </div>

  <div class="taskbar">
    Web Windows OS
  </div>

</div>

<script>
const win = document.getElementById("window");

function openWindow() {
  win.style.display = "flex";
  win.style.top = "100px";
  win.style.left = "100px";
}

function closeWindow() {
  win.style.display = "none";
}

/* 🪟 Drag system */
let isDragging = false;
let offsetX, offsetY;

const dragbar = document.getElementById("dragbar");

dragbar.addEventListener("mousedown", (e) => {
  isDragging = true;
  offsetX = e.clientX - win.offsetLeft;
  offsetY = e.clientY - win.offsetTop;
});

document.addEventListener("mousemove", (e) => {
  if (isDragging) {
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  }
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});
</script>

</body>
</html>
