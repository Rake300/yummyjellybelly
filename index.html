<!DOCTYPE html>
<html>
<head>
  <title>Cyber Windows OS</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: radial-gradient(circle at top, #0b0014, #000);
      color: #0ff;
    }

    .desktop {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* ICONS */
    .icon {
      width: 90px;
      text-align: center;
      cursor: pointer;
      margin: 20px;
      user-select: none;
      text-shadow: 0 0 10px #0ff;
    }

    /* WINDOW */
    .window {
      position: absolute;
      width: 520px;
      height: 380px;
      background: #0a0a0a;
      border: 1px solid #0ff;
      box-shadow: 0 0 20px #0ff;
      display: none;
      flex-direction: column;
      z-index: 1;
    }

    .titlebar {
      height: 30px;
      background: #0ff;
      color: black;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      cursor: move;
      font-weight: bold;
      user-select: none;
    }

    .close {
      cursor: pointer;
      color: red;
    }

    .content {
      flex: 1;
      padding: 10px;
      overflow: auto;
    }

    input, textarea {
      width: 100%;
      background: black;
      color: #0ff;
      border: 1px solid #0ff;
    }

    button {
      background: black;
      border: 1px solid #0ff;
      color: #0ff;
      cursor: pointer;
      margin-top: 5px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* TASKBAR */
    .taskbar {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 45px;
      background: rgba(0,0,0,0.8);
      border-top: 1px solid #0ff;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .start-btn {
      border: 1px solid #0ff;
      padding: 5px 12px;
      cursor: pointer;
    }

    .task-items {
      display: flex;
      margin-left: 10px;
      gap: 5px;
    }

    .task-item {
      border: 1px solid #0ff;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 12px;
    }

    /* START MENU */
    .start-menu {
      position: absolute;
      bottom: 50px;
      left: 10px;
      width: 240px;
      background: rgba(0,0,0,0.95);
      border: 1px solid #0ff;
      box-shadow: 0 0 20px #0ff;
      display: none;
      flex-direction: column;
      z-index: 999;
    }

    .menu-item {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #033;
    }

    .menu-item:hover {
      background: #0ff;
      color: black;
    }
  </style>
</head>

<body>

<div class="desktop">

  <!-- ICONS -->
  <div class="icon" onclick="openApp('game')">🎮<br>Game</div>
  <div class="icon" onclick="openApp('notepad')">📝<br>Notepad</div>
  <div class="icon" onclick="openApp('calc')">🧮<br>Calc</div>
  <div class="icon" onclick="openApp('terminal')">🤖<br>Terminal</div>
  <div class="icon" onclick="openApp('ddg')">🌐<br>Search</div>
  <div class="icon" onclick="openApp('ai')">🤖<br>AI</div>
  <div class="icon" onclick="openApp('files')">📁<br>Files</div>
  <div class="icon" onclick="openApp('vm')">🖥<br>VM</div>

  <!-- WINDOWS -->
  <div id="game" class="window"><div class="titlebar">Game <span onclick="closeApp('game')" class="close">X</span></div><div class="content"><iframe src="https://www.crazygames.com/embed/2048"></iframe></div></div>

  <div id="notepad" class="window"><div class="titlebar">Notepad <span onclick="closeApp('notepad')" class="close">X</span></div><div class="content"><textarea></textarea></div></div>

  <div id="calc" class="window"><div class="titlebar">Calc <span onclick="closeApp('calc')" class="close">X</span></div><div class="content"><input id="a"><input id="b"><button onclick="add()">Add</button><p id="res"></p></div></div>

  <div id="terminal" class="window"><div class="titlebar">Terminal <span onclick="closeApp('terminal')" class="close">X</span></div><div class="content"><input id="cmd" onkeydown="cmdRun(event)"><p id="out"></p></div></div>

  <div id="ddg" class="window"><div class="titlebar">Search <span onclick="closeApp('ddg')" class="close">X</span></div><div class="content"><input id="q"><button onclick="search()">Go</button></div></div>

  <div id="ai" class="window"><div class="titlebar">AI <span onclick="closeApp('ai')" class="close">X</span></div><div class="content"><input id="aiin"><button onclick="askAI()">Ask</button><p id="aiout"></p></div></div>

  <div id="files" class="window"><div class="titlebar">Files <span onclick="closeApp('files')" class="close">X</span></div><div class="content"><input id="fn"><textarea id="fd"></textarea><button onclick="save()">Save</button><button onclick="load()">Load</button><div id="list"></div></div></div>

  <div id="vm" class="window"><div class="titlebar">VM <span onclick="closeApp('vm')" class="close">X</span></div><div class="content"><button onclick="vm('start')">Boot</button><p id="vmout"></p></div></div>

  <!-- START MENU -->
  <div id="start" class="start-menu">
    <div class="menu-item" onclick="openApp('game')">🎮 Game</div>
    <div class="menu-item" onclick="openApp('notepad')">📝 Notepad</div>
    <div class="menu-item" onclick="openApp('calc')">🧮 Calculator</div>
    <div class="menu-item" onclick="openApp('terminal')">🤖 Terminal</div>
    <div class="menu-item" onclick="openApp('ddg')">🌐 Search</div>
    <div class="menu-item" onclick="openApp('ai')">🤖 AI</div>
    <div class="menu-item" onclick="openApp('files')">📁 Files</div>
    <div class="menu-item" onclick="openApp('vm')">🖥 VM</div>
  </div>

  <!-- TASKBAR -->
  <div class="taskbar">
    <div class="start-btn" onclick="toggleStart()">☰ START</div>
    <div class="task-items" id="tasks"></div>
  </div>

</div>

<script>

let topZ = 10;

/* OPEN WINDOW + TASKBAR */
function openApp(id){
  let w = document.getElementById(id);
  w.style.display = "flex";
  w.style.top = "80px";
  w.style.left = "80px";
  w.style.zIndex = ++topZ;

  addTask(id);
  document.getElementById("start").style.display="none";
}

function closeApp(id){
  document.getElementById(id).style.display="none";
}

/* TASKBAR */
function addTask(id){
  let tasks = document.getElementById("tasks");
  if(document.getElementById("t_"+id)) return;

  let t = document.createElement("div");
  t.className="task-item";
  t.id="t_"+id;
  t.innerText=id;
  t.onclick=()=>openApp(id);
  tasks.appendChild(t);
}

/* START MENU */
function toggleStart(){
  let s=document.getElementById("start");
  s.style.display = (s.style.display==="flex")?"none":"flex";
}

/* CALC */
function add(){
  document.getElementById("res").innerText =
  (+a.value)+(+b.value);
}

/* TERMINAL */
function cmdRun(e){
  if(e.key==="Enter"){
    out.innerText = cmd.value==="hello"?"hi":cmd.value;
  }
}

/* SEARCH */
function search(){
  window.open("https://duckduckgo.com/?q="+q.value);
}

/* AI */
function askAI(){
  aiout.innerText = aiin.value.includes("time")?new Date():"AI online";
}

/* FILES */
function save(){
  localStorage.setItem(fn.value,fd.value);
}

function load(){
  list.innerHTML="";
  for(let k in localStorage){
    let d=document.createElement("div");
    d.innerText=k;
    list.appendChild(d);
  }
}

/* VM */
function vm(x){
  vmout.innerText = x==="start"?"VM running":"ok";
}

/* DRAG WINDOWS */
document.addEventListener("mousedown",e=>{
  let w=e.target.closest(".window");
  if(!w) return;

  let offX=e.clientX-w.offsetLeft;
  let offY=e.clientY-w.offsetTop;

  function move(e){
    w.style.left=e.clientX-offX+"px";
    w.style.top=e.clientY-offY+"px";
  }

  document.addEventListener("mousemove",move);
  document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
});

</script>

</body>
</html>
